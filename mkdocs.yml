site_name: APIwithGO

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Unit 1 - Go Crash Course:
      - Lesson: unit1/lesson.md
      - Exercise 1: unit1/exercise1.md
      - Exercise 1 Solution: unit1/exercise1_solution.md
      - Exercise 2: unit1/exercise2.md
      - Exercise 2 Solution: unit1/exercise2_solution.md
  - Unit 2 - Basic HTTP Server:
      - Lesson: unit2/lesson.md
      - Exercise 1: unit2/exercise1.md
      - Exercise 1 Solution: unit2/exercise1_solution.md
      - Exercise 2: unit2/exercise2.md
      - Exercise 2 Solution: unit2/exercise2_solution.md
